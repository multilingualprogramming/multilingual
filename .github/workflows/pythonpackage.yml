# This workflow installs dependencies and runs tests on the supported Python baseline.
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        python -m pip install wasmtime
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Packaging and CLI smoke
      run: |
        pip install .
        python -m multilingualprogramming --version
        python -m multilingualprogramming smoke --all
        python -m multilingualprogramming encoding-check-generated examples/complete_features_en.multi --lang en
        python -m multilingualprogramming build-wasm-bundle examples/complete_features_en.multi --lang en --out-dir build/wasm
    - name: Test unittests and get code coverage
      run: |
        pytest --cov=multilingualprogramming tests/ -v
