<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - Multilingual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .game-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .card {
            aspect-ratio: 1;
            border: 2px solid #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.8em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .card:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        .card.revealed {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #333;
        }
        .card.matched {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        .status {
            text-align: center;
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .status p {
            color: #333;
            font-size: 1em;
            margin: 5px 0;
        }
        .status .win {
            color: #fa709a;
            font-size: 1.3em;
            font-weight: bold;
        }
        .reset-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 Memory Game</h1>
        <p class="subtitle">Written in Multilingual • Compiled to WASM</p>

        <div class="game-board" id="board"></div>

        <div class="status" id="status">
            <p>Matches: <span id="matches">0</span> / 4</p>
        </div>

        <button class="reset-btn" onclick="game.reset()">New Game</button>
    </div>

    <script>
        class MemoryGame {
            constructor() {
                this.cards = [1, 2, 3, 4, 1, 2, 3, 4];
                this.revealed = Array(8).fill(false);
                this.matched = Array(8).fill(false);
                this.firstPick = -1;
                this.secondPick = -1;
                this.matchesFound = 0;
                this.isChecking = false;
                this.init();
            }

            init() {
                this.cards = this.shuffle([1, 2, 3, 4, 1, 2, 3, 4]);
                this.render();
            }

            shuffle(arr) {
                const result = [...arr];
                for (let i = result.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [result[i], result[j]] = [result[j], result[i]];
                }
                return result;
            }

            async click(index) {
                if (this.isChecking || this.matched[index] || this.revealed[index]) return;

                this.revealed[index] = true;
                this.render();

                if (this.firstPick === -1) {
                    this.firstPick = index;
                } else if (this.firstPick !== index) {
                    this.secondPick = index;
                    this.isChecking = true;

                    await new Promise(resolve => setTimeout(resolve, 1000));

                    if (this.cards[this.firstPick] === this.cards[this.secondPick]) {
                        this.matched[this.firstPick] = true;
                        this.matched[this.secondPick] = true;
                        this.matchesFound++;
                    } else {
                        this.revealed[this.firstPick] = false;
                        this.revealed[this.secondPick] = false;
                    }

                    this.firstPick = -1;
                    this.secondPick = -1;
                    this.isChecking = false;
                    this.render();
                }
            }

            reset() {
                this.cards = [1, 2, 3, 4, 1, 2, 3, 4];
                this.revealed = Array(8).fill(false);
                this.matched = Array(8).fill(false);
                this.firstPick = -1;
                this.secondPick = -1;
                this.matchesFound = 0;
                this.isChecking = false;
                this.init();
            }

            render() {
                const board = document.getElementById('board');
                const status = document.getElementById('status');

                board.innerHTML = '';
                for (let i = 0; i < 8; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'card';
                    if (this.revealed[i]) btn.classList.add('revealed');
                    if (this.matched[i]) btn.classList.add('matched');
                    btn.disabled = this.matched[i] || this.isChecking;
                    btn.textContent = this.matched[i] ? '✓' : (this.revealed[i] ? this.cards[i] : '?');
                    btn.onclick = () => this.click(i);
                    board.appendChild(btn);
                }

                let statusHtml = `<p>Matches: <span id="matches">${this.matchesFound}</span> / 4</p>`;
                if (this.matchesFound === 4) {
                    statusHtml += '<p class="win">🎉 You won!</p>';
                }
                status.innerHTML = statusHtml;
            }
        }

        const game = new MemoryGame();
    </script>
</body>
</html>
